<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PAC·COMMITS — eat the contribution graph</title>
<meta name="description" content="Playable Pac-Man on a real GitHub contribution graph. Theme: manjeet-singh.com">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M8 1a7 7 0 1 0 0 14 7 7 0 0 0 5.6-2.8L8 8l5.6-4.2A7 7 0 0 0 8 1z' fill='%23e8ff47'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#020408; --surface:#0a0e14; --surface2:#101620;
    --border:rgba(92,214,255,0.12); --border2:rgba(92,214,255,0.25);
    --cyan:#5cd6ff; --cyan-dim:rgba(92,214,255,0.08); --cyan-glow:rgba(92,214,255,0.2);
    --accent:#e8ff47; --accent-dim:rgba(232,255,71,0.1);
    --green:#4ade80; --text:#e8edf4; --muted:#637485; --muted2:#3d4e5e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(92,214,255,0.07) 0%, transparent 70%),
      linear-gradient(rgba(92,214,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(92,214,255,0.04) 1px, transparent 1px);
    background-size:100% 100%, 42px 42px, 42px 42px;
    display:flex;align-items:center;justify-content:center;padding:18px 10px;
  }
  .frame{width:min(1120px,100%)}
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  h1{
    font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(22px,4vw,34px);letter-spacing:.5px;
    background:linear-gradient(135deg,#e8edf4 0%,#5cd6ff 60%,#4ade80 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;
  }
  .sub{color:var(--muted);font-size:11px;margin-top:6px}
  .sub b{color:var(--cyan);font-weight:500}
  .hud{display:flex;gap:22px;font-size:12px;text-align:right}
  .hud .lbl{color:var(--muted);font-size:10px;letter-spacing:1.5px}
  .hud .val{color:var(--accent);font-size:18px;font-weight:500;text-shadow:0 0 12px var(--accent-dim)}
  .hud .val.cy{color:var(--cyan);text-shadow:0 0 12px var(--cyan-glow)}
  #lives{display:flex;gap:5px;justify-content:flex-end;padding-top:5px;min-height:18px}
  #lives svg{filter:drop-shadow(0 0 3px rgba(232,255,71,.5))}
  .stage{
    position:relative;border:1px solid var(--border);border-radius:12px;background:var(--surface);
    box-shadow:0 0 0 6px rgba(92,214,255,0.04), 0 0 60px rgba(92,214,255,0.07);
    overflow:hidden;
  }
  .stage::after{ /* scanlines */
    content:"";position:absolute;inset:0;pointer-events:none;border-radius:12px;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.16) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  .scroller{overflow-x:auto;scrollbar-width:thin}
  canvas{display:block;width:100%;min-width:680px;height:auto}
  #ov{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;background:rgba(2,4,8,0.82);backdrop-filter:blur(3px);text-align:center;padding:8px 12px;z-index:2;overflow:auto;
  }
  #ov.hide{display:none}
  #ov h2{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(15px,2.6vw,24px);letter-spacing:2px;color:var(--accent);text-shadow:0 0 24px rgba(232,255,71,.35);line-height:1}
  #ov h2.cy{color:var(--cyan);text-shadow:0 0 24px var(--cyan-glow)}
  #ov p{color:var(--muted);font-size:11px;max-width:620px;line-height:1.5}
  #ov .press{color:var(--text);font-size:11px;letter-spacing:2px;animation:blink 1.1s steps(2) infinite}
  @keyframes blink{50%{opacity:.15}}
  #userForm{display:flex;gap:8px;margin-top:4px}
  #userForm input{
    background:var(--surface2);border:1px solid var(--border2);color:var(--text);
    font-family:'DM Mono',monospace;font-size:12px;padding:8px 12px;border-radius:7px;width:230px;outline:none;
  }
  #userForm input:focus{border-color:var(--cyan);box-shadow:0 0 14px var(--cyan-glow)}
  #userForm button{
    background:var(--cyan-dim);border:1px solid var(--border2);color:var(--cyan);cursor:pointer;
    font-family:'DM Mono',monospace;font-size:12px;padding:8px 14px;border-radius:7px;letter-spacing:1px;
  }
  #userForm button:hover{box-shadow:0 0 20px var(--cyan-glow);border-color:var(--cyan)}
  footer{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:12px;color:var(--muted);font-size:10.5px;letter-spacing:.4px}
  footer a{color:var(--cyan);text-decoration:none}
  footer a:hover{text-shadow:0 0 10px var(--cyan-glow)}
  kbd{border:1px solid var(--border2);border-radius:4px;padding:1px 5px;font-size:10px;color:var(--text)}
  #dpad{display:none;margin:16px auto 0;width:168px;user-select:none;touch-action:none}
  #dpad .row{display:flex;justify-content:center;gap:6px;margin-bottom:6px}
  #dpad button{
    width:52px;height:46px;border-radius:10px;border:1px solid var(--border2);
    background:var(--surface2);color:var(--cyan);font-size:18px;font-family:'DM Mono',monospace;
  }
  #dpad button:active{background:var(--cyan-dim);box-shadow:0 0 16px var(--cyan-glow)}
  @media (pointer:coarse){ #dpad{display:block} }
</style>
</head>
<body>
<div class="frame">
  <header>
    <div>
      <h1>PAC·COMMITS</h1>
      <div class="sub">// eating <b id="subUser">…</b>'s contribution graph</div>
    </div>
    <div class="hud">
      <div><div class="lbl">SCORE</div><div class="val" id="score">0</div></div>
      <div><div class="lbl">HI-SCORE</div><div class="val cy" id="hi">0</div></div>
      <div><div class="lbl">COMMITS</div><div class="val cy" id="commits">0/0</div></div>
      <div><div class="lbl">LIVES</div><div id="lives"></div></div>
    </div>
  </header>

  <div class="stage">
    <div class="scroller"><canvas id="cv"></canvas></div>
    <div id="ov">
      <h2 id="ovTitle">PAC·COMMITS</h2>
      <p id="ovMsg">Loading contribution graph…</p>
      <form id="userForm" autocomplete="off">
        <input id="userInput" spellcheck="false" placeholder="github username">
        <button type="submit">LOAD</button>
      </form>
      <div class="press" id="ovPress" style="display:none">PRESS ENTER · OR TAP HERE</div>
    </div>
  </div>

  <div id="dpad">
    <div class="row"><button data-d="0,-1">▲</button></div>
    <div class="row"><button data-d="-1,0">◀</button><button data-d="0,1">▼</button><button data-d="1,0">▶</button></div>
  </div>

  <footer>
    <div><kbd>←↑↓→</kbd>/<kbd>WASD</kbd> move · <kbd>P</kbd> pause · <kbd>M</kbd> sound · swipe on mobile</div>
    <div>built for <a href="https://manjeet-singh.com" target="_blank" rel="noopener">manjeet-singh.com</a> · <a id="ghLink" href="#" target="_blank" rel="noopener">github profile</a></div>
  </footer>
</div>

<script>
"use strict";
/* ============================================================
   PAC·COMMITS — playable Pac-Man on a GitHub contribution graph
   Theme: manjeet-singh.com  (#020408 / #5cd6ff / #e8ff47 / #4ade80)
   ============================================================ */
const COLS = 53, ROWS = 7, CS = 18, PAD = 12, TOP = 26, DPR = 2;
const CW = PAD * 2 + COLS * CS, CH = TOP + ROWS * CS + PAD;
const C = {
  bg: "#020408", empty: "#0d131c", emptyEaten: "#0a1018",
  levels: ["#0d131c", "#193946", "#2b6377", "#4197b5", "#5cd6ff"],
  pac: "#e8ff47", cyan: "#5cd6ff", green: "#4ade80", white: "#e8edf4",
  muted: "#637485", muted2: "#3d4e5e", fright: "#22364a",
};
const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

const cv = document.getElementById("cv");
cv.width = CW * DPR; cv.height = CH * DPR;
const ctx = cv.getContext("2d");
ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

const $ = id => document.getElementById(id);
const ov = $("ov"), ovTitle = $("ovTitle"), ovMsg = $("ovMsg"), ovPress = $("ovPress"), userForm = $("userForm");

/* ---------- state ---------- */
// localStorage throws in sandboxed iframes — never let it kill the game
const store = {
  get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
};
let user = new URLSearchParams(location.search).get("user") || "manjeetsingh-satveer";
let grid = [];            // grid[c][r] = {count, level, pellet, power, eaten}
let monthLabels = [];     // [{c, label}]
let pelletsTotal = 0, pelletsLeft = 0, commitsTotal = 0, commitsEaten = 0;
let score = 0, hi = +(store.get("paccommits-hi") || 0);
let lives = 3, level = 1, chain = 0;
let state = "LOADING";    // LOADING START READY PLAY DYING CLEARED OVER PAUSED
let stateT = 0, frightT = 0, modeT = 0, modeIdx = 0, now = 0;
let muted = store.get("paccommits-mute") === "1";
const MODE_SCHED = [["scatter",4],["chase",16]];
$("hi").textContent = hi;
$("ghLink").href = "https://github.com/" + user;

/* ---------- audio (tiny WebAudio blips) ---------- */
let ac = null, wakaHi = false;
function beep(f0, f1, dur, type, vol) {
  if (muted) return;
  try {
    ac = ac || new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === "suspended") ac.resume();
    const o = ac.createOscillator(), g = ac.createGain(), t0 = ac.currentTime;
    o.type = type; o.frequency.setValueAtTime(f0, t0);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g).connect(ac.destination); o.start(t0); o.stop(t0 + dur);
  } catch (e) {}
}
const sfx = {
  waka()  { beep(wakaHi ? 420 : 310, wakaHi ? 320 : 220, 0.06, "square", 0.03); wakaHi = !wakaHi; },
  power() { beep(180, 640, 0.3, "square", 0.045); },
  ghost() { beep(500, 1300, 0.25, "triangle", 0.05); },
  death() { beep(480, 60, 0.9, "sawtooth", 0.05); },
  ready() { beep(330, 660, 0.18, "triangle", 0.04); },
};

/* ---------- movers ---------- */
function mkMover(c, r) { return { fc: c, fr: r, tc: c, tr: r, t: 1, dir: null }; }
function mvX(m) { return m.fc + (m.tc - m.fc) * m.t; }
function mvY(m) { return m.fr + (m.tr - m.fr) * m.t; }
function cellOf(m) { return { c: ((Math.round(mvX(m)) % COLS) + COLS) % COLS, r: Math.round(mvY(m)) }; }
const rowOK = r => r >= 0 && r < ROWS;

function advance(m, dt, speed, onArrive) {
  let dist = speed * dt;
  let guard = 0;
  while (dist > 0 && guard++ < 64) {
    if (m.t >= 1) {
      m.fc = ((m.tc % COLS) + COLS) % COLS; m.fr = m.tr; m.t = 0;
      const d = onArrive(m);
      m.dir = d || null;
      if (!d) { m.tc = m.fc; m.tr = m.fr; m.t = 1; return; }
      m.tc = m.fc + d.x; m.tr = m.fr + d.y;
    }
    const step = Math.min(dist, 1 - m.t);
    m.t += step; dist -= step;
  }
}
function reverse(m) {
  if (!m.dir || m.t >= 1) return false;
  const { fc, fr, tc, tr, t } = m;
  // new "from" = old "to" (wrapped), new "to" = one cell back the way we came
  m.fc = ((tc % COLS) + COLS) % COLS; m.fr = tr;
  m.tc = m.fc - (tc - fc); m.tr = m.fr - (tr - fr);
  m.t = 1 - t;
  m.dir = { x: -m.dir.x, y: -m.dir.y };
  return true;
}

/* ---------- entities ---------- */
const pac = { m: mkMover(5, 3), want: null, mouth: 0 };
const GHOST_DEFS = [
  { name: "SUDO", color: C.cyan,  glow: "rgba(92,214,255,.5)",  home: { c: 26, r: 3 }, corner: { c: 52, r: 0 }, wait: 0 },
  { name: "BASH", color: C.green, glow: "rgba(74,222,128,.5)",  home: { c: 25, r: 3 }, corner: { c: 0,  r: 0 }, wait: 3 },
  { name: "GREP", color: C.white, glow: "rgba(232,237,244,.4)", home: { c: 27, r: 3 }, corner: { c: 52, r: 6 }, wait: 7 },
];
let ghosts = [];

function resetPositions() {
  pac.m = mkMover(5, 3); pac.want = { x: 1, y: 0 }; pac.mouth = 0;
  ghosts = GHOST_DEFS.map(g => ({
    ...g, m: mkMover(g.home.c, g.home.r), eyes: false, waitT: g.wait, rngT: 0,
  }));
  frightT = 0; modeT = 0; modeIdx = 0; chain = 0;
}

/* ---------- data ---------- */
async function loadUser(name) {
  state = "LOADING"; showOverlay("PAC·COMMITS", "Loading @" + name + "'s contribution graph…", false);
  let days = null;
  try {
    const r = await fetch("https://github-contributions-api.jogruber.de/v4/" + encodeURIComponent(name) + "?y=last");
    if (!r.ok) throw new Error("HTTP " + r.status);
    days = (await r.json()).contributions;
  } catch (e) { days = null; }

  let demo = false;
  const weeks = [];
  if (days && days.length) {
    let week = null;
    for (const d of days) {
      const dow = new Date(d.date + "T00:00:00Z").getUTCDay();
      if (!week || dow === 0) { week = Array(7).fill(null); weeks.push(week); }
      week[dow] = { count: d.count, level: d.level, date: d.date };
    }
  }
  let w = weeks.slice(-COLS);
  const total = w.flat().reduce((s, d) => s + (d ? d.count : 0), 0);
  if (!w.length || total === 0) {           // API down or empty graph → demo board
    demo = true; w = [];
    for (let c = 0; c < COLS; c++) {
      const col = [];
      for (let r = 0; r < ROWS; r++) {
        const v = Math.max(0, Math.round(3.4 * Math.abs(Math.sin(c * 0.55 + r * 1.3)) - 1 + ((c * 7 + r * 13) % 5 === 0 ? 1 : 0)));
        col.push({ count: v, level: Math.min(v, 4), date: null });
      }
      w.push(col);
    }
  }

  grid = Array.from({ length: COLS }, (_, c) =>
    Array.from({ length: ROWS }, (_, r) => {
      const d = w[c]?.[r];
      return { count: d?.count || 0, level: d?.level || 0, pellet: (d?.level || 0) > 0, power: false, eaten: false, date: d?.date };
    })
  );

  // month labels
  monthLabels = []; let prevM = -1, lastC = -5;
  for (let c = 0; c < COLS; c++) {
    const d = grid[c].map(x => x.date).find(Boolean);
    if (!d) continue;
    const mo = new Date(d + "T00:00:00Z").getUTCMonth();
    if (mo !== prevM && c - lastC >= 3 && c < COLS - 2) { monthLabels.push({ c, label: MONTHS[mo] }); lastC = c; }
    prevM = mo;
  }

  // power pellets: 4 biggest commit days
  const all = [];
  for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r].pellet) all.push(grid[c][r]);
  all.sort((a, b) => b.count - a.count).slice(0, 4).forEach(d => d.power = true);

  commitsTotal = all.reduce((s, d) => s + d.count, 0);
  pelletsTotal = all.length;
  resetBoard(); resetPositions();
  score = 0; lives = 3; level = 1; updateHud();
  $("subUser").textContent = demo ? name + " (demo data)" : name;
  $("ghLink").href = "https://github.com/" + name;
  state = "START";
  showOverlay("PAC·COMMITS", (demo
    ? "Couldn't load that graph — running demo pellets. "
    : "@" + name + " pushed " + commitsTotal + " contributions this year. ")
    + "Eat every block. Big commit days are power pellets — eat one and the ghosts run.", true);
}

function resetBoard() {
  for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) grid[c][r].eaten = false;
  pelletsLeft = pelletsTotal; commitsEaten = 0;
}

/* ---------- HUD ---------- */
function miniPac() {
  return '<svg width="14" height="14" viewBox="0 0 16 16"><path d="M8 1a7 7 0 1 0 0 14 7 7 0 0 0 5.6-2.8L8 8l5.6-4.2A7 7 0 0 0 8 1z" fill="' + C.pac + '"/></svg>';
}
function updateHud() {
  $("score").textContent = score;
  $("hi").textContent = hi;
  $("commits").textContent = commitsEaten + "/" + commitsTotal;
  $("lives").innerHTML = miniPac().repeat(Math.max(0, lives));
}
function showOverlay(title, msg, press, cyanTitle) {
  ovTitle.textContent = title; ovTitle.className = cyanTitle ? "cy" : "";
  ovMsg.textContent = msg;
  ovPress.style.display = press ? "" : "none";
  userForm.style.display = (state === "START" || state === "LOADING" || state === "OVER") ? "" : "none";
  ov.classList.remove("hide");
}
function hideOverlay() { ov.classList.add("hide"); }

/* ---------- game flow ---------- */
function startRun() {
  resetBoard(); resetPositions();
  score = 0; lives = 3; level = 1; updateHud();
  toReady();
}
function toReady() {
  resetPositions(); state = "READY"; stateT = 0;
  showOverlay("READY!", "level " + level, false, true); sfx.ready();
}
function gameOver() {
  state = "OVER"; stateT = 0;
  if (score > hi) { hi = score; store.set("paccommits-hi", hi); }
  updateHud();
  showOverlay("GAME OVER", "score " + score + " · " + commitsEaten + " commits eaten · hi-score " + hi, true);
}

/* ---------- ghost AI ---------- */
const DIRS = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }];
function wrapDx(a, b) { let d = Math.abs(a - b); return Math.min(d, COLS - d); }
function dist2(c1, r1, c2, r2) { const dx = wrapDx(c1, c2), dy = r1 - r2; return dx * dx + dy * dy; }

function ghostTarget(g) {
  const p = cellOf(pac.m), pd = pac.m.dir || { x: 1, y: 0 };
  if (g.eyes) return g.home;
  if (g.name === "SUDO") return { c: p.c, r: p.r };
  if (g.name === "BASH") return { c: ((p.c + pd.x * 4) % COLS + COLS) % COLS, r: Math.min(ROWS - 1, Math.max(0, p.r + pd.y * 4)) };
  const gc = cellOf(g.m);
  return dist2(gc.c, gc.r, p.c, p.r) > 64 ? { c: p.c, r: p.r } : g.corner;
}

function ghostArrive(g) {
  return m => {
    if (g.eyes && m.fc === g.home.c && m.fr === g.home.r) { g.eyes = false; }
    const mode = g.eyes ? "eyes" : frightT > 0 ? "fright" : MODE_SCHED[modeIdx][0];
    const rev = m.dir ? { x: -m.dir.x, y: -m.dir.y } : null;
    let cands = DIRS.filter(d => rowOK(m.fr + d.y) && !(rev && d.x === rev.x && d.y === rev.y));
    if (!cands.length) cands = DIRS.filter(d => rowOK(m.fr + d.y));
    if (mode === "fright") return cands[(Math.random() * cands.length) | 0];
    const tgt = mode === "scatter" && !g.eyes ? g.corner : ghostTarget(g);
    if (mode !== "eyes" && Math.random() < 0.08) return cands[(Math.random() * cands.length) | 0];
    let best = cands[0], bd = Infinity;
    for (const d of cands) {
      const nc = ((m.fc + d.x) % COLS + COLS) % COLS, nr = m.fr + d.y;
      const sc = dist2(nc, nr, tgt.c, tgt.r);
      if (sc < bd) { bd = sc; best = d; }
    }
    return best;
  };
}

function pacArrive(m) {
  const cell = grid[m.fc][m.fr];
  if (cell.pellet && !cell.eaten) {
    cell.eaten = true; pelletsLeft--; commitsEaten += cell.count;
    score += 10 + cell.count * 2; sfx.waka();
    if (cell.power) {
      score += 40; frightT = Math.max(2, 6 - (level - 1) * 0.7); chain = 0; sfx.power();
      for (const g of ghosts) if (!g.eyes) reverse(g.m);
      popups.push({ x: m.fc, y: m.fr, txt: "POWER!", ttl: 1, color: C.pac });
    }
    updateHud();
    if (pelletsLeft <= 0) { state = "CLEARED"; stateT = 0; showOverlay("GRID CLEARED!", "level " + level + " complete — score " + score, false, true); return null; }
  }
  const ok = d => d && rowOK(m.fr + d.y);
  if (ok(pac.want)) return pac.want;
  if (ok(m.dir)) return m.dir;
  return null;
}

/* ---------- update ---------- */
const popups = [];
function speeds() {
  const gs = Math.min(7.4, 6.6 + (level - 1) * 0.25);
  return { pac: 7.6, ghost: gs, fright: 4.2, eyes: 14 };
}
function update(dt) {
  now += dt;
  if (state === "READY")   { stateT += dt; if (stateT > 1.4) { state = "PLAY"; hideOverlay(); } return; }
  if (state === "CLEARED") { stateT += dt; if (stateT > 2.2) { level++; resetBoard(); updateHud(); toReady(); } return; }
  if (state === "DYING")   {
    stateT += dt;
    if (stateT > 1.3) { lives--; updateHud(); if (lives < 0) gameOver(); else toReady(); }
    return;
  }
  if (state !== "PLAY") return;

  const sp = speeds();
  if (frightT > 0) frightT = Math.max(0, frightT - dt);
  else { modeT += dt; if (modeT > MODE_SCHED[modeIdx][1]) { modeT = 0; modeIdx = (modeIdx + 1) % MODE_SCHED.length; for (const g of ghosts) if (!g.eyes) reverse(g.m); } }

  // pacman
  pac.mouth += dt * 11;
  advance(pac.m, dt, sp.pac, pacArrive);
  if (state !== "PLAY") return; // CLEARED can fire inside pacArrive

  // ghosts
  for (const g of ghosts) {
    if (g.waitT > 0) { g.waitT -= dt; continue; }
    let s = g.eyes ? sp.eyes : frightT > 0 ? sp.fright : sp.ghost;
    const gx = mvX(g.m);
    if (!g.eyes && (gx < 3 || gx > COLS - 4)) s *= 0.6;   // slow in the "tunnel"
    advance(g.m, dt, s, ghostArrive(g));
  }

  // collisions
  const px = mvX(pac.m), py = mvY(pac.m);
  for (const g of ghosts) {
    if (g.waitT > 0 || g.eyes) continue;
    const dx = wrapDx(px, mvX(g.m)), dy = py - mvY(g.m);
    if (dx * dx + dy * dy < 0.45) {
      if (frightT > 0) {
        g.eyes = true; chain++;
        const pts = 100 * Math.pow(2, chain);
        score += pts; updateHud(); sfx.ghost();
        popups.push({ x: mvX(g.m), y: mvY(g.m), txt: "+" + pts, ttl: 1, color: C.cyan });
      } else {
        state = "DYING"; stateT = 0; sfx.death(); return;
      }
    }
  }

  for (let i = popups.length - 1; i >= 0; i--) { popups[i].ttl -= dt; popups[i].y -= dt * 1.2; if (popups[i].ttl <= 0) popups.splice(i, 1); }
}

/* ---------- draw ---------- */
function rr(x, y, w, h, r) {
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); }
  else { ctx.beginPath(); ctx.rect(x, y, w, h); }
}
const pxOf = c => PAD + (c + 0.5) * CS;
const pyOf = r => TOP + (r + 0.5) * CS;

function drawCell(c, r) {
  const d = grid[c][r];
  const x = PAD + c * CS + 1.5, y = TOP + r * CS + 1.5, s = CS - 3;
  if (!d.pellet || d.eaten) {
    ctx.fillStyle = d.eaten ? C.emptyEaten : C.empty;
    rr(x, y, s, s, 3); ctx.fill();
    if (d.eaten) { ctx.strokeStyle = "rgba(92,214,255,0.07)"; ctx.lineWidth = 1; rr(x + .5, y + .5, s - 1, s - 1, 3); ctx.stroke(); }
    return;
  }
  ctx.fillStyle = C.levels[Math.min(d.level, 4)];
  if (d.power) {
    const pulse = 0.72 + 0.28 * Math.sin(now * 5);
    ctx.save();
    ctx.shadowColor = C.cyan; ctx.shadowBlur = 9 * pulse;
    rr(x - 1, y - 1, s + 2, s + 2, 4); ctx.fill();
    ctx.restore();
    ctx.fillStyle = "rgba(255,255,255," + (0.25 * pulse) + ")";
    rr(x + 3.5, y + 3.5, s - 7, s - 7, 2); ctx.fill();
  } else {
    rr(x, y, s, s, 3); ctx.fill();
  }
}

function drawPac() {
  const x = pxOf(mvX(pac.m)), y = pyOf(mvY(pac.m));
  const d = pac.m.dir || pac.want || { x: 1, y: 0 };
  let ang = Math.atan2(d.y, d.x);
  let mo = state === "PLAY" ? (0.18 + 0.42 * Math.abs(Math.sin(pac.mouth))) : 0.25;
  let radius = 8;
  if (state === "DYING") {                       // death: mouth opens all the way around
    const k = Math.min(1, stateT / 1.1);
    mo = 0.25 + k * Math.PI * 0.94; radius = 8 * (1 - k * 0.55); ang = -Math.PI / 2;
  }
  ctx.save();
  ctx.translate(x, y); ctx.rotate(ang);
  ctx.shadowColor = "rgba(232,255,71,0.8)"; ctx.shadowBlur = 10;
  ctx.fillStyle = C.pac;
  ctx.beginPath(); ctx.moveTo(0, 0);
  ctx.arc(0, 0, radius, mo, Math.PI * 2 - mo); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawGhost(g) {
  const x = pxOf(mvX(g.m)), y = pyOf(mvY(g.m));
  const fr = frightT > 0 && !g.eyes;
  const flash = fr && frightT < 1.6 && Math.floor(now * 8) % 2 === 0;
  ctx.save();
  ctx.translate(x, y);
  if (g.waitT > 0) ctx.globalAlpha = 0.45;
  if (!g.eyes) {
    const body = fr ? (flash ? C.white : C.fright) : g.color;
    ctx.shadowColor = fr ? "rgba(92,214,255,.4)" : g.glow; ctx.shadowBlur = 8;
    ctx.fillStyle = body;
    const R = 7.5, B = 6;
    ctx.beginPath();
    ctx.moveTo(-R, B);
    ctx.lineTo(-R, -0.5);
    ctx.arc(0, -0.5, R, Math.PI, 0);
    ctx.lineTo(R, B);
    for (let i = 0; i < 3; i++) { ctx.lineTo(R - (i * 2 + 1) * R / 3, B - 2.2); ctx.lineTo(R - (i * 2 + 2) * R / 3, B); }
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
  }
  // eyes
  const d = g.m.dir || { x: -1, y: 0 };
  const exo = d.x * 1.4, eyo = d.y * 1.4;
  ctx.fillStyle = fr ? C.white : "#fff";
  if (fr) {
    ctx.fillRect(-3.6, -3, 2.4, 2.4); ctx.fillRect(1.2, -3, 2.4, 2.4);
    ctx.strokeStyle = flash ? C.fright : C.white; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(-4.5, 3);
    for (let i = 0; i < 4; i++) { ctx.lineTo(-4.5 + i * 3 + 1.5, 1.6); ctx.lineTo(-4.5 + (i + 1) * 3, 3); }
    ctx.stroke();
  } else {
    ctx.beginPath(); ctx.ellipse(-2.7 + exo * .6, -1.8 + eyo * .6, 2.3, 2.6, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(2.7 + exo * .6, -1.8 + eyo * .6, 2.3, 2.6, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#0a0e14";
    ctx.beginPath(); ctx.arc(-2.7 + exo * 1.3, -1.8 + eyo * 1.3, 1.15, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(2.7 + exo * 1.3, -1.8 + eyo * 1.3, 1.15, 0, 7); ctx.fill();
  }
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, CW, CH);
  // month labels
  ctx.font = "500 9px 'DM Mono', monospace";
  ctx.fillStyle = C.muted; ctx.textBaseline = "alphabetic";
  for (const ml of monthLabels) ctx.fillText(ml.label, PAD + ml.c * CS, TOP - 9);
  if (grid.length) {
    for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) drawCell(c, r);
    for (const g of ghosts) if (g.eyes) drawGhost(g);
    if (state !== "OVER") drawPac();
    for (const g of ghosts) if (!g.eyes) drawGhost(g);
  }
  for (const p of popups) {
    ctx.globalAlpha = Math.min(1, p.ttl * 2);
    ctx.font = "500 10px 'DM Mono', monospace";
    ctx.fillStyle = p.color; ctx.textAlign = "center";
    ctx.fillText(p.txt, pxOf(p.x), pyOf(p.y) - 10);
    ctx.globalAlpha = 1; ctx.textAlign = "left";
  }
  // fright timer bar
  if (frightT > 0 && state === "PLAY") {
    const w = (CW - PAD * 2) * (frightT / Math.max(2, 6 - (level - 1) * 0.7));
    ctx.fillStyle = "rgba(92,214,255,0.5)";
    ctx.fillRect(PAD, CH - 4, w, 2);
  }
}

/* ---------- loop ---------- */
let last = performance.now();
function frame(ts) {
  const dt = Math.min(0.05, (ts - last) / 1000); last = ts;
  update(dt); draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------- input ---------- */
function setWant(x, y) {
  pac.want = { x, y };
  if (state === "PLAY" && pac.m.dir && pac.m.dir.x === -x && pac.m.dir.y === -y) {
    reverse(pac.m); pac.want = { x, y };
  }
}
function primary() { // enter / tap
  if (state === "START" || state === "OVER") startRun();
  else if (state === "PAUSED") { state = "PLAY"; hideOverlay(); }
}
const KEYS = {
  ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
  w: [0,-1], s: [0,1], a: [-1,0], d: [1,0], W: [0,-1], S: [0,1], A: [-1,0], D: [1,0],
};
addEventListener("keydown", e => {
  if (e.target === $("userInput")) return;
  if (KEYS[e.key]) { e.preventDefault(); setWant(...KEYS[e.key]); return; }
  if (e.key === "Enter") { e.preventDefault(); primary(); }
  if ((e.key === "p" || e.key === "P") && (state === "PLAY" || state === "PAUSED")) {
    if (state === "PLAY") { state = "PAUSED"; showOverlay("PAUSED", "press P to resume", false, true); }
    else { state = "PLAY"; hideOverlay(); }
  }
  if (e.key === "m" || e.key === "M") {
    muted = !muted; store.set("paccommits-mute", muted ? "1" : "0");
    popups.push({ x: cellOf(pac.m).c, y: cellOf(pac.m).r, txt: muted ? "MUTED" : "SOUND ON", ttl: 1, color: C.muted });
  }
});
addEventListener("blur", () => { if (state === "PLAY") { state = "PAUSED"; showOverlay("PAUSED", "press P to resume", false, true); } });

// tap overlay to start
ov.addEventListener("pointerdown", e => {
  if (e.target.closest("#userForm")) return;
  primary();
});
// swipe
let ts = null;
cv.addEventListener("touchstart", e => { ts = e.touches[0]; }, { passive: true });
cv.addEventListener("touchmove", e => {
  if (!ts) return;
  const t = e.touches[0], dx = t.clientX - ts.clientX, dy = t.clientY - ts.clientY;
  if (Math.hypot(dx, dy) > 24) {
    Math.abs(dx) > Math.abs(dy) ? setWant(Math.sign(dx), 0) : setWant(0, Math.sign(dy));
    ts = t;
  }
}, { passive: true });
// d-pad
for (const b of document.querySelectorAll("#dpad button")) {
  b.addEventListener("pointerdown", e => {
    e.preventDefault();
    const [x, y] = b.dataset.d.split(",").map(Number);
    setWant(x, y);
    if (state === "START" || state === "OVER") primary();
  });
}
// username form
userForm.addEventListener("submit", e => {
  e.preventDefault();
  const v = $("userInput").value.trim();
  if (v) { history.replaceState(null, "", "?user=" + encodeURIComponent(v)); user = v; loadUser(v); }
});

/* ---------- boot ---------- */
$("userInput").value = user;
updateHud();
loadUser(user);
</script>
</body>
</html>
